<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자리보고 | 결제 실패</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    body {
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: #0b1020;
      color: #fff;
      font-family: Inter, sans-serif;
      margin: 0;
      padding: 24px;
    }

    .payment-result-card {
      width: 100%;
      max-width: 560px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 32px 24px;
      box-sizing: border-box;
      backdrop-filter: blur(8px);
    }

    .payment-result-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      margin-bottom: 16px;
    }

    .payment-result-title {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.25;
      color: #fca5a5;
    }

    .payment-result-desc {
      margin: 0 0 20px;
      color: rgba(255, 255, 255, 0.74);
      line-height: 1.6;
    }

    .payment-result-box {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .payment-result-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .payment-result-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      padding: 12px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }

    .payment-result-btn.primary {
      background: #ffffff;
      color: #111827;
    }

    .payment-result-btn.secondary {
      background: transparent;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
  </style>
</head>
<body>
  <div class="payment-result-card">
    <div class="payment-result-badge">Toss Payments</div>
    <h1 class="payment-result-title">결제가 완료되지 않았어요</h1>
    <p class="payment-result-desc">
      결제 과정에서 취소되었거나 오류가 발생했습니다. 다시 시도하실 수 있어요.
    </p>

    <div class="payment-result-box" id="failBox">실패 정보를 확인 중입니다.</div>

    <div class="payment-result-actions">
      <a href="/mypage.html#dashboard" class="payment-result-btn primary">마이페이지로 돌아가기</a>
      <a href="/index.html" class="payment-result-btn secondary">메인으로 이동</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const message = params.get("message");

    localStorage.removeItem("pending_order_id");
    localStorage.removeItem("pending_product_name");
    localStorage.removeItem("pending_amount");
    localStorage.setItem("payment_failed", "1");
    localStorage.setItem(
      "payment_failed_message",
      `code=${code || "-"}, message=${message || "알 수 없는 오류"}`
    );

    const failBox = document.getElementById("failBox");
    failBox.textContent = `code=${code || "-"}\nmessage=${message || "알 수 없는 오류"}`;
  </script>
</body>
</html>
