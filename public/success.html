<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자리보고 | 결제 승인 중</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800;900&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    body {
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      background: #0b1020;
      color: #fff;
      font-family: Inter, sans-serif;
      margin: 0;
      padding: 24px;
    }

    .payment-result-card {
      width: 100%;
      max-width: 560px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 32px 24px;
      box-sizing: border-box;
      backdrop-filter: blur(8px);
    }

    .payment-result-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      margin-bottom: 16px;
    }

    .payment-result-title {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.25;
    }

    .payment-result-desc {
      margin: 0 0 20px;
      color: rgba(255, 255, 255, 0.74);
      line-height: 1.6;
    }

    .payment-result-box {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .payment-result-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .payment-result-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      padding: 12px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      border: none;
      cursor: pointer;
    }

    .payment-result-btn.primary {
      background: #ffffff;
      color: #111827;
    }

    .payment-result-btn.secondary {
      background: transparent;
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .status-success { color: #86efac; }
    .status-error { color: #fca5a5; }
    .status-processing { color: #93c5fd; }
  </style>
</head>
<body>
  <div class="payment-result-card">
    <div class="payment-result-badge">Toss Payments</div>
    <h1 class="payment-result-title" id="statusTitle">결제 승인 처리 중입니다</h1>
    <p class="payment-result-desc" id="statusDesc">
      결제 정보를 확인하고 크레딧을 반영하고 있어요. 잠시만 기다려주세요.
    </p>

    <div class="payment-result-box" id="statusBox">
      paymentKey, orderId, amount 정보를 확인 중입니다.
    </div>

    <div class="payment-result-actions">
      <a href="/mypage.html" class="payment-result-btn primary">마이페이지로 이동</a>
      <a href="/index.html" class="payment-result-btn secondary">메인으로 이동</a>
    </div>
  </div>

  <script>
    const titleEl = document.getElementById("statusTitle");
    const descEl = document.getElementById("statusDesc");
    const boxEl = document.getElementById("statusBox");

    function setProcessing(message) {
      titleEl.textContent = "결제 승인 처리 중입니다";
      titleEl.className = "payment-result-title status-processing";
      descEl.textContent = "결제 정보를 확인하고 크레딧을 반영하고 있어요. 잠시만 기다려주세요.";
      boxEl.textContent = message;
    }

    function setSuccess(message) {
      titleEl.textContent = "결제가 완료되었어요";
      titleEl.className = "payment-result-title status-success";
      descEl.textContent = "구매하신 분석 크레딧이 정상적으로 반영되었습니다. 잠시 후 마이페이지로 이동합니다.";
      boxEl.textContent = message;
    }

    function setError(message) {
      titleEl.textContent = "결제 승인 처리에 실패했어요";
      titleEl.className = "payment-result-title status-error";
      descEl.textContent = "결제는 완료되었더라도 승인 반영 과정에서 문제가 생겼을 수 있어요. 아래 내용을 확인해주세요.";
      boxEl.textContent = message;
    }

    async function run() {
      try {
        const params = new URLSearchParams(window.location.search);
        const paymentKey = params.get("paymentKey");
        const orderId = params.get("orderId");
        const amount = params.get("amount");

        if (!paymentKey || !orderId || !amount) {
          setError("필수 쿼리 파라미터(paymentKey, orderId, amount)가 누락되었습니다.");
          return;
        }

        setProcessing(`주문번호 ${orderId} 승인 요청을 보내는 중입니다...`);

        const response = await fetch(
          "https://cbfhjycvvlfdqvnzbxfr.supabase.co/functions/v1/confirm-toss-payment",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": "sb_publishable_ttZslHz5mE4MHGPtq0FMbg_9u5YXQUD"
            },
            body: JSON.stringify({
              paymentKey,
              orderId,
              amount: Number(amount)
            })
          }
        );

        const data = await response.json();

        if (!response.ok || !data?.success) {
          localStorage.removeItem("pending_order_id");
          localStorage.removeItem("pending_product_name");
          localStorage.removeItem("pending_amount");

          setError(
            `${data?.error || "결제 승인 중 알 수 없는 오류가 발생했습니다."}${
              data?.detail ? `\n\n${JSON.stringify(data.detail, null, 2)}` : ""
            }`
          );
          console.error("[success.html] confirm failed", data);
          return;
        }

        localStorage.removeItem("pending_order_id");
        localStorage.removeItem("pending_product_name");
        localStorage.removeItem("pending_amount");
        localStorage.setItem("payment_completed", "1");
        localStorage.setItem("payment_completed_order_id", orderId);
        localStorage.setItem("payment_completed_amount", String(amount));

        setSuccess(
          `주문번호 ${orderId} 승인이 완료되었습니다.\n결제 금액 ${Number(amount).toLocaleString()}원이 반영되었고, 크레딧 지급 로직이 실행되었습니다.`
        );
        console.log("[success.html] confirm success", data);

        setTimeout(() => {
          window.location.href = "/mypage.html#dashboard";
        }, 2200);
      } catch (err) {
        localStorage.removeItem("pending_order_id");
        localStorage.removeItem("pending_product_name");
        localStorage.removeItem("pending_amount");

        const message = err instanceof Error ? err.message : String(err);
        setError(message);
        console.error("[success.html] unexpected error", err);
      }
    }

    run();
  </script>
</body>
</html>
